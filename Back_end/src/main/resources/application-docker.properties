spring.datasource.url=jdbc:mysql://mysql:3306/web_bansach?useSSL=false&serverTimezone=Asia/Ho_Chi_Minh
spring.datasource.username=spring
spring.datasource.password=spring

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# JWT Configuration
jwt.secret=${JWT_SECRET:your-secret-key-change-this-in-production}
jwt.expiration=${JWT_EXPIRATION:1800000}

# Cloudinary Configuration
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}


